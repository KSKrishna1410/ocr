<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>glByte OCR</title>
    <link rel="stylesheet" type="text/css" href="/static/swagger-ui/dist/swagger-ui.css" />
    <style>
        body {
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .box {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            margin: 50px auto;
            max-width: 700px;
        }
        .swagg{
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            margin: 50px;
            max-width: auto;
        }
        h1 {
            color: #333;
        }
        img.logo {
            width: 150px;
            margin-bottom: 20px;
        }
        #swagger-ui {
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="http://192.168.0.103:8085/files/ocr_files/glb-logo.png" alt="glByte Logo" class="logo" />
        <h1>Welcome to glByte InHouse OCR</h1>
        <p>FastAPI-based document intelligence engine</p>
        <button id="swagger-button" onclick="loadSwagger()">Try it now</button>
        
    </div>
    <div id="swagger-ui"></div>
    <script src="/static/swagger-ui/dist/swagger-ui-bundle.js"></script>
    <script src="/static/swagger-ui/dist/swagger-ui-standalone-preset.js"></script>
    <script>
        const showSwaggerButton = true;
        window.onload = () => {
            if (showSwaggerButton) {
                document.getElementById('swagger-button').style.display = 'inline-block';
            }
        };
        function loadSwagger() {
            SwaggerUIBundle({
                url: "/openapi.json",
                dom_id: '#swagger-ui',
                presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
                layout: "BaseLayout"
            });
            document.getElementById('swagger-button').style.display = 'none'; // Hide after loading
        }
    </script>
</body>
</html>
